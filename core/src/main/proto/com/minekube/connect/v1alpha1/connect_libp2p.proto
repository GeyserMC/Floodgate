// Remove this copy once the canonical Buf Java artifact is available.
syntax = "proto3";

package minekube.connect.v1alpha1;

import "google/rpc/status.proto";

message PeerRegisterInit {
  string endpoint = 1;
  string token = 2;
  string endpoint_instance_id = 3;
  string endpoint_peer_id = 4;
  string endpoint_public_key = 5;
  repeated string parent_endpoints = 6;
  OfflineMode offline_mode = 7;
  repeated string capabilities = 8;
  repeated string observed_addrs = 9;
  PeerCapacity capacity = 10;
  int64 issued_at_unix_ms = 11;
  int64 expires_at_unix_ms = 12;
}

message PeerCapacity {
  uint32 max_sessions = 1;
  uint32 active_sessions = 2;
}

enum OfflineMode {
  OFFLINE_MODE_UNSPECIFIED = 0;
  OFFLINE_MODE_ALLOWED = 1;
  OFFLINE_MODE_DENIED = 2;
}

message EndpointPeerRecord {
  uint32 version = 1;
  string endpoint = 2;
  string endpoint_hash = 3;
  string endpoint_id = 4;
  string endpoint_instance_id = 5;
  string endpoint_peer_id = 6;
  string endpoint_public_key = 7;
  string publisher_id = 8;
  string publisher_peer_id = 9;
  string region = 10;
  repeated string addrs = 11;
  repeated string direct_addrs = 12;
  repeated string capabilities = 13;
  PeerCapacity capacity = 14;
  OfflineMode offline_mode = 15;
  uint64 sequence = 16;
  int64 issued_at_unix_ms = 17;
  int64 renewed_at_unix_ms = 18;
  int64 expires_at_unix_ms = 19;
  bytes nonce = 20;
}

message PeerRegisterChallenge {
  string endpoint_id = 1;
  string endpoint_hash = 2;
  string publisher_id = 3;
  repeated string relay_addrs = 4;
  int64 kv_ttl_ms = 5;
  int64 renew_interval_ms = 6;
  bytes nonce = 7;
  string publisher_peer_id = 8;
  string region = 9;
}

message PeerRegisterCommit {
  EndpointPeerRecord record = 1;
  bytes signature = 2;
}

message PeerRegisterResult {
  string endpoint_id = 1;
  string endpoint_hash = 2;
  uint64 kv_revision = 3;
}

message SessionOffer {
  string session_id = 1;
  string endpoint = 2;
  SessionPlayer player = 3;
  SessionAuthentication auth = 4;
  int64 deadline_unix_ms = 5;
}

message SessionPlayer {
  SessionGameProfile profile = 1;
  string addr = 2;
}

message SessionGameProfile {
  string id = 1;
  string name = 2;
  repeated SessionGameProfileProperty properties = 3;
}

message SessionGameProfileProperty {
  string name = 1;
  string value = 2;
  string signature = 3;
}

message SessionAuthentication {
  bool passthrough = 1;
}

message SessionResponse {
  string session_id = 1;
  oneof result {
    SessionAck ack = 2;
    SessionAccepted accepted = 3;
    SessionRejected rejected = 4;
  }
}

message SessionAck {}

message SessionAccepted {
  bool same_stream_data = 1;
  string data_stream_id = 2;
}

message SessionRejected {
  google.rpc.Status reason = 1;
}

message SessionCancel {
  string session_id = 1;
  google.rpc.Status reason = 2;
}

message EndpointStatus {
  string edition = 1;
  string requested_host = 2;
  uint32 requested_port = 3;
  uint32 client_protocol = 4;
  uint32 client_protocol_min = 5;
  uint32 client_protocol_max = 6;
  bool online = 7;
  string version_name = 8;
  uint32 protocol = 9;
  uint32 players_online = 10;
  uint32 players_max = 11;
  string description_json = 12;
  string favicon_data_url = 13;
  int64 expires_at_unix_ms = 14;
}

message StatusReport {
  string endpoint_id = 1;
  string endpoint_hash = 2;
  string endpoint_instance_id = 3;
  string endpoint_peer_id = 4;
  repeated EndpointStatus statuses = 5;
  int64 observed_at_unix_ms = 6;
}
